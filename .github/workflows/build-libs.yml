name: Build Native Libs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Builds native libs for:
#   - macOS arm64  (Apple Silicon — also runs on Intel via Rosetta 2)
#   - Windows x64  (also covers Snapdragon via x64 emulation)
# macOS x64 runner retired by GitHub.
# All compiled against LuaJIT 2.1 (Lua 5.1 ABI) to match Love2D's bundled runtime.
#
# macOS arm64 libs:  lua-utf8, rex_onig, lfs, lpeg, mecab, jieba, libthai (dylib)
# Windows x64 libs:  lua-utf8, rex_onig

jobs:

  # ── macOS arm64 (Apple Silicon) ──────────────────────────────
  mac-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: brew install luajit luarocks oniguruma mecab libthai

      - name: Build Lua C extensions
        run: |
          LUAJIT="$(brew --prefix luajit)"
          ONIG="$(brew --prefix oniguruma)"
          luarocks --lua-dir="$LUAJIT" install luautf8
          luarocks --lua-dir="$LUAJIT" install lrexlib-oniguruma \
            ONIGURUMA_INCDIR="$ONIG/include" \
            ONIGURUMA_LIBDIR="$ONIG/lib"
          luarocks --lua-dir="$LUAJIT" install luafilesystem
          luarocks --lua-dir="$LUAJIT" install lpeg

      - name: Build lua-mecab
        run: |
          git clone --depth=1 https://github.com/polm/lua-mecab.git
          cd lua-mecab
          luarocks --lua-dir="$(brew --prefix luajit)" make \
            MECAB_INCDIR="$(brew --prefix mecab)/include" \
            MECAB_LIBDIR="$(brew --prefix mecab)/lib"

      - name: Build luajieba
        run: |
          git clone --depth=1 --recurse-submodules https://github.com/chenghf/luajieba.git
          cd luajieba
          SPEC=$(find . -name "*.rockspec" | head -1)
          luarocks --lua-dir="$(brew --prefix luajit)" make "$SPEC"

      - name: Fix dylib load paths + re-sign
        run: |
          ONIG_DYLIB="$(ls "$(brew --prefix oniguruma)/lib"/libonig.*.dylib | head -1)"
          REX="$(find ~/.luarocks -name "rex_onig.so" | head -1)"
          install_name_tool -change "$ONIG_DYLIB" "@loader_path/$(basename "$ONIG_DYLIB")" "$REX"
          codesign --force --sign - "$REX"

          MECAB_DYLIB="$(ls "$(brew --prefix mecab)/lib"/libmecab*.dylib | head -1)"
          MECAB_SO="$(find ~/.luarocks -name "mecab.so" | head -1)"
          install_name_tool -change "$MECAB_DYLIB" "@loader_path/$(basename "$MECAB_DYLIB")" "$MECAB_SO"
          codesign --force --sign - "$MECAB_SO"

      - name: Collect artifacts
        run: |
          mkdir -p dist/mac_arm64
          # Lua C extension .so files
          find ~/.luarocks -name "lua-utf8.so" -exec cp {} dist/mac_arm64/ \;
          find ~/.luarocks -name "rex_onig.so"  -exec cp {} dist/mac_arm64/ \;
          find ~/.luarocks -name "lfs.so"        -exec cp {} dist/mac_arm64/ \;
          find ~/.luarocks -name "lpeg.so"       -exec cp {} dist/mac_arm64/ \;
          find ~/.luarocks -name "mecab.so"      -exec cp {} dist/mac_arm64/ \;
          find ~/.luarocks -name "jieba.so"  -exec cp {} dist/mac_arm64/ \; 2>/dev/null || true
          find ~/.luarocks -name "cjieba.so" -exec cp {} dist/mac_arm64/ \; 2>/dev/null || true
          # Runtime dylibs
          cp "$(ls "$(brew --prefix oniguruma)/lib"/libonig.*.dylib | head -1)" dist/mac_arm64/
          cp "$(ls "$(brew --prefix mecab)/lib"/libmecab*.dylib      | head -1)" dist/mac_arm64/
          # libthai is FFI-loaded at runtime — bundle the dylib
          LIBTHAI_LIB="$(ls "$(brew --prefix libthai)/lib"/libthai*.dylib 2>/dev/null | head -1)"
          [ -n "$LIBTHAI_LIB" ] && cp "$LIBTHAI_LIB" dist/mac_arm64/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: mac-arm64
          path: dist/mac_arm64/
